name: "自动同步上游（保留本地修改）"

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0:00 执行
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 同步上游（冲突时优先保留本地修改）
        run: |
          # 添加上游仓库
          git remote add upstream https://github.com/slobys/openclash-auto-installer.git
          git fetch upstream main
          
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/main)
          
          echo "本地 commit: ${LOCAL_COMMIT:0:8}"
          echo "上游 commit: ${UPSTREAM_COMMIT:0:8}"
          
          if [ "$LOCAL_COMMIT" = "$UPSTREAM_COMMIT" ]; then
            echo "⏭️ 无上游更新"
            exit 0
          fi
          
          echo "🔄 检测到上游更新，正在合并..."
          
          # 尝试合并，冲突时自动使用本地版本（-X ours）
          # 注意：-X ours 表示保留本地修改，丢弃上游的冲突部分
          if git merge upstream/main --no-edit --allow-unrelated-histories -X ours; then
            echo "✅ 合并成功（冲突时已保留本地修改）"
            git push origin main
          else
            echo "❌ 合并失败，请手动处理"
            git merge --abort
            exit 1
          fi
